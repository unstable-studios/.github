name: Stale

on:
  workflow_call:
    inputs:
      days-before-stale:
        description: "Days before marking as stale"
        type: number
        default: 30
      days-before-close:
        description: "Days after stale before closing"
        type: number
        default: 7
      stale-issue-label:
        description: "Label for stale issues"
        type: string
        default: "stale"
      stale-pr-label:
        description: "Label for stale PRs"
        type: string
        default: "stale"
      exempt-issue-labels:
        description: "Comma-separated labels to exempt from stale"
        type: string
        default: "pinned,security"
      exempt-pr-labels:
        description: "Comma-separated labels to exempt from stale"
        type: string
        default: "pinned,security"

jobs:
  stale:
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v10
        with:
          days-before-stale: ${{ inputs.days-before-stale }}
          days-before-close: ${{ inputs.days-before-close }}
          stale-issue-label: ${{ inputs.stale-issue-label }}
          stale-pr-label: ${{ inputs.stale-pr-label }}
          exempt-issue-labels: ${{ inputs.exempt-issue-labels }}
          exempt-pr-labels: ${{ inputs.exempt-pr-labels }}
          stale-issue-message: "This issue has been automatically marked as stale due to inactivity. It will be closed in ${{ inputs.days-before-close }} days if no further activity occurs."
          stale-pr-message: "This PR has been automatically marked as stale due to inactivity. It will be closed in ${{ inputs.days-before-close }} days if no further activity occurs."
