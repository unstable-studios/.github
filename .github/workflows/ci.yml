name: CI

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version"
        type: string
        default: "22"
      pnpm-version:
        description: "pnpm version"
        type: string
        default: "10"
      working-directory:
        description: "Working directory for all steps"
        type: string
        default: "."
      lint-script:
        description: "Lint command to run"
        type: string
        default: "pnpm lint"
      typecheck-script:
        description: "Typecheck command to run"
        type: string
        default: "pnpm typecheck"
      build-script:
        description: "Build command to run"
        type: string
        default: "pnpm build"
      test-script:
        description: "Test command to run (empty to skip)"
        type: string
        default: "pnpm test"
      post-build-script:
        description: "Additional script to run after build (empty to skip)"
        type: string
        default: ""
      install-playwright:
        description: "Install Playwright browsers for E2E tests"
        type: boolean
        default: false
      playwright-script:
        description: "Playwright E2E test command (empty to skip)"
        type: string
        default: ""
      doppler-project:
        description: "Doppler project name for env injection (empty to skip)"
        type: string
        default: ""
      doppler-config:
        description: "Doppler config environment (e.g. ci, staging)"
        type: string
        default: "ci"
      enable-matrix:
        description: "Run lint/typecheck/build/test as separate matrix jobs"
        type: boolean
        default: false
      skip-on-docs-only:
        description: "Skip CI when PR only touches docs/non-code files"
        type: boolean
        default: true
    secrets:
      DOPPLER_TOKEN:
        required: false

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!**/docs/**'
              - '!**/LICENSE*'
              - '!**/.editorconfig'
              - '!**/.vscode/**'
              - '!**/CLAUDE.md'
              - '!**/.specifyignore'
              - '!**/.prettierignore'
              - '!**/.gitignore'

  ci:
    needs: changes
    if: >-
      !inputs.enable-matrix
      && (needs.changes.outputs.code == 'true' || !inputs.skip-on-docs-only)
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm-version }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Doppler
        if: inputs.doppler-project != ''
        uses: dopplerhq/cli-action@v3
        with:
          version: latest

      - name: Lint
        if: inputs.lint-script != ''
        run: ${{ inputs.doppler-project != '' && format('doppler run -p {0} -c {1} -- ', inputs.doppler-project, inputs.doppler-config) || '' }}${{ inputs.lint-script }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Typecheck
        if: inputs.typecheck-script != ''
        run: ${{ inputs.doppler-project != '' && format('doppler run -p {0} -c {1} -- ', inputs.doppler-project, inputs.doppler-config) || '' }}${{ inputs.typecheck-script }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Build
        if: inputs.build-script != ''
        run: ${{ inputs.doppler-project != '' && format('doppler run -p {0} -c {1} -- ', inputs.doppler-project, inputs.doppler-config) || '' }}${{ inputs.build-script }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Post-build
        if: inputs.post-build-script != ''
        run: ${{ inputs.post-build-script }}

      - name: Test
        if: inputs.test-script != ''
        run: ${{ inputs.doppler-project != '' && format('doppler run -p {0} -c {1} -- ', inputs.doppler-project, inputs.doppler-config) || '' }}${{ inputs.test-script }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Install Playwright browsers
        if: inputs.install-playwright
        run: pnpm exec playwright install --with-deps

      - name: E2E tests
        if: inputs.playwright-script != ''
        run: ${{ inputs.doppler-project != '' && format('doppler run -p {0} -c {1} -- ', inputs.doppler-project, inputs.doppler-config) || '' }}${{ inputs.playwright-script }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

  ci-matrix:
    needs: changes
    if: >-
      inputs.enable-matrix
      && (needs.changes.outputs.code == 'true' || !inputs.skip-on-docs-only)
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Lint
            script: lint-script
          - name: Typecheck
            script: typecheck-script
          - name: Build
            script: build-script
          - name: Test
            script: test-script
    name: ${{ matrix.name }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm-version }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Doppler
        if: inputs.doppler-project != '' && inputs[matrix.script] != ''
        uses: dopplerhq/cli-action@v3
        with:
          version: latest

      - name: ${{ matrix.name }}
        if: inputs[matrix.script] != ''
        run: ${{ inputs.doppler-project != '' && format('doppler run -p {0} -c {1} -- ', inputs.doppler-project, inputs.doppler-config) || '' }}${{ inputs[matrix.script] }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

  # Stable check for branch protection. Succeeds when CI passes or
  # when CI is skipped because only non-code files changed.
  ci-ok:
    if: always()
    needs: [changes, ci, ci-matrix]
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    steps:
      - run: |
          if [ "$CODE_CHANGED" != "true" ]; then
            echo "CI skipped — only non-code files changed"
            exit 0
          fi
          if [ "$CI_RESULT" = "success" ] || [ "$CI_RESULT" = "skipped" ]; then
            if [ "$MATRIX_RESULT" = "success" ] || [ "$MATRIX_RESULT" = "skipped" ]; then
              echo "CI passed"
              exit 0
            fi
          fi
          echo "CI failed"
          exit 1
        env:
          CODE_CHANGED: ${{ needs.changes.outputs.code }}
          CI_RESULT: ${{ needs.ci.result }}
          MATRIX_RESULT: ${{ needs.ci-matrix.result }}
