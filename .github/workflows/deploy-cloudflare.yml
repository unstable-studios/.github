name: Deploy Cloudflare

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version"
        type: string
        default: "22"
      pnpm-version:
        description: "pnpm version"
        type: string
        default: "10"
      environment:
        description: "GitHub environment for deployment protection"
        type: string
        default: "production"
      working-directory:
        description: "Working directory for wrangler"
        type: string
        default: "."
      build-script:
        description: "Build command before deploy"
        type: string
        default: "pnpm build"
      wrangler-command:
        description: "Wrangler deploy command"
        type: string
        default: "pnpm exec wrangler deploy"
      migration-command:
        description: "Migration command to run before deploy (e.g. 'pnpm drizzle-kit migrate'). Empty to skip."
        type: string
        default: ""
      pre-deploy-script:
        description: "Script to run before deploy (e.g. secret pushing)"
        type: string
        default: ""
      post-deploy-script:
        description: "Script to run after deploy (empty to skip)"
        type: string
        default: ""
      doppler-project:
        description: "Doppler project name (empty to skip Doppler)"
        type: string
        default: ""
      doppler-config:
        description: "Doppler config environment"
        type: string
        default: "production"
      sync-doppler-secrets:
        description: "Sync Doppler secrets to Wrangler (masked→secrets, unmasked→vars). Replaces manual pre-deploy secret pushing."
        type: boolean
        default: false
      doppler-exclude-keys:
        description: "Regex pattern for Doppler keys to exclude from Wrangler sync (e.g. CI-only keys)"
        type: string
        default: "^(DOPPLER_|CLOUDFLARE_|GH_|AWS_)"
      registry-url:
        description: "npm registry URL for authentication (e.g. https://npm.pkg.github.com for GitHub Packages)"
        type: string
        default: ""
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true
      DOPPLER_TOKEN:
        required: false

concurrency:
  group: deploy-cloudflare-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: ${{ inputs.pnpm-version }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: ${{ inputs.registry-url || '' }}
          cache: pnpm

      - name: Check GitHub Packages lockfile config
        run: |
          for npmrc in "$GITHUB_WORKSPACE/.npmrc" ".npmrc"; do
            if [ -f "$npmrc" ] && grep -q 'npm.pkg.github.com' "$npmrc" && ! grep -q 'lockfile-include-tarball-url=true' "$npmrc"; then
              echo "::error file=$npmrc::.npmrc uses GitHub Packages but is missing lockfile-include-tarball-url=true"
              echo "pnpm constructs incorrect tarball URLs for GitHub Packages without this setting."
              echo ""
              echo "Fix: add 'lockfile-include-tarball-url=true' to .npmrc, then regenerate the lockfile:"
              echo "  pnpm store prune && rm pnpm-lock.yaml && rm -rf node_modules && pnpm install"
              echo ""
              echo "See: https://github.com/pnpm/pnpm/issues/7579"
              exit 1
            fi
          done

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Doppler
        if: inputs.doppler-project != ''
        uses: dopplerhq/cli-action@v4

      - name: Run migrations
        if: inputs.migration-command != ''
        run: |
          if [ -n "$DOPPLER_PROJECT" ]; then
            doppler run -p "$DOPPLER_PROJECT" -c "$DOPPLER_CONFIG" -- ${{ inputs.migration-command }}
          else
            ${{ inputs.migration-command }}
          fi
        env:
          DOPPLER_PROJECT: ${{ inputs.doppler-project }}
          DOPPLER_CONFIG: ${{ inputs.doppler-config }}
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build
        run: |
          if [ -n "$DOPPLER_PROJECT" ]; then
            doppler run -p "$DOPPLER_PROJECT" -c "$DOPPLER_CONFIG" -- ${{ inputs.build-script }}
          else
            ${{ inputs.build-script }}
          fi
        env:
          DOPPLER_PROJECT: ${{ inputs.doppler-project }}
          DOPPLER_CONFIG: ${{ inputs.doppler-config }}
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Sync Doppler to Wrangler
        if: inputs.sync-doppler-secrets && inputs.doppler-project != ''
        shell: bash
        run: |
          # shellcheck disable=SC2016
          # Fetch all Doppler secrets with metadata
          ALL=$(doppler secrets --json -p "$DOPPLER_PROJECT" -c "$DOPPLER_CONFIG")

          # Extract masked values as wrangler secrets (excluding CI-only keys)
          SECRETS=$(echo "$ALL" | jq -c --arg exclude "$EXCLUDE_PATTERN" '
            with_entries(
              select(if ($exclude | length) > 0 then (.key | test($exclude) | not) else true end)
              | select(.value.computedVisibility == "masked")
              | .value = .value.computed
            )')

          # Push masked values as wrangler secrets
          if [ "$(echo "$SECRETS" | jq 'length')" -gt 0 ]; then
            echo "$SECRETS" | pnpm exec wrangler secret bulk
          fi

          # Build --var args for unmasked values using NUL delimiter for safety
          echo "$ALL" | jq -j --arg exclude "$EXCLUDE_PATTERN" '
            to_entries
            | map(select(if ($exclude | length) > 0 then (.key | test($exclude) | not) else true end)
                  | select(.value.computedVisibility == "unmasked"))
            | map("--var\u0000" + .key + ":" + .value.computed + "\u0000")
            | .[]' > /tmp/wrangler-var-args.bin
        env:
          DOPPLER_PROJECT: ${{ inputs.doppler-project }}
          DOPPLER_CONFIG: ${{ inputs.doppler-config }}
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          EXCLUDE_PATTERN: ${{ inputs.doppler-exclude-keys }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Pre-deploy
        if: inputs.pre-deploy-script != ''
        run: ${{ inputs.pre-deploy-script }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Deploy
        run: |
          ARGS=()
          if [ -f /tmp/wrangler-var-args.bin ] && [ -s /tmp/wrangler-var-args.bin ]; then
            while IFS= read -r -d '' arg; do
              ARGS+=("$arg")
            done < /tmp/wrangler-var-args.bin
          fi
          if [ -n "$DOPPLER_PROJECT" ]; then
            doppler run -p "$DOPPLER_PROJECT" -c "$DOPPLER_CONFIG" -- ${{ inputs.wrangler-command }} "${ARGS[@]}"
          else
            ${{ inputs.wrangler-command }} "${ARGS[@]}"
          fi
        env:
          DOPPLER_PROJECT: ${{ inputs.doppler-project }}
          DOPPLER_CONFIG: ${{ inputs.doppler-config }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Post-deploy
        if: inputs.post-deploy-script != ''
        run: ${{ inputs.post-deploy-script }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
