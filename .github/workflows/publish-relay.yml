name: Publish to Relay

on:
  workflow_call:
    inputs:
      relay-url:
        description: "Relay server base URL"
        type: string
        default: "https://relay.unstablestudios.com"
      org:
        description: "Organization slug in Relay (auto-created if new)"
        type: string
        required: true
      product:
        description: "Product slug in Relay (auto-created if new)"
        type: string
        required: true
      version:
        description: "Version string (e.g. from release-please)"
        type: string
        required: true
      artifact-name:
        description: "GitHub Actions artifact name to download (from actions/upload-artifact)"
        type: string
        required: true
      artifact-path:
        description: >
          Path to the file(s) within the downloaded artifact.
          Supports glob patterns (e.g. "*.dmg", "dist/*") to upload multiple files.
        type: string
        required: true
      checksum-sha256:
        description: "Pre-computed SHA-256 checksum (single file only; server computes if omitted)"
        type: string
        default: ""
      file-name:
        description: "Display name override (single-file only). For multi-file uploads, each file gets a name auto-generated from its filename."
        type: string
        default: ""
    secrets:
      RELAY_API_SECRET:
        required: true
    outputs:
      file-ids:
        description: "Comma-separated list of Relay file IDs"
        value: ${{ jobs.upload.outputs.file_ids }}

jobs:
  upload:
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    outputs:
      file_ids: ${{ steps.publish.outputs.file_ids }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}

      - name: Upload to Relay
        id: publish
        run: |
          shopt -s nullglob

          # shellcheck disable=SC2206
          FILES=($INPUT_ARTIFACT_PATH)

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "::error::No files matched pattern: $INPUT_ARTIFACT_PATH"
            exit 1
          fi

          echo "Found ${#FILES[@]} file(s) to upload"
          FILE_IDS=()
          FILE_COUNT=${#FILES[@]}

          for FILE in "${FILES[@]}"; do
            if [ ! -f "$FILE" ]; then
              echo "::warning::Skipping non-file: $FILE"
              continue
            fi

            FILENAME=$(basename "$FILE")
            SIZE=$(stat -c%s "$FILE" 2>/dev/null || stat -f%z "$FILE")
            echo "Uploading $FILENAME ($SIZE bytes)..."

            CURL_ARGS=(
              -sS --fail-with-body
              -X POST
              -H "Authorization: Bearer $RELAY_API_SECRET"
              -F "file=@${FILE}"
              --form-string "org=${INPUT_ORG}"
              --form-string "product=${INPUT_PRODUCT}"
              --form-string "version=${INPUT_VERSION}"
            )

            # Only pass checksum for single-file uploads
            if [ "$FILE_COUNT" -eq 1 ] && [ -n "$INPUT_CHECKSUM" ]; then
              CURL_ARGS+=(--form-string "checksum_sha256=${INPUT_CHECKSUM}")
            fi

            # Generate display name: use explicit input (single-file only), otherwise derive from filename
            if [ "$FILE_COUNT" -eq 1 ] && [ -n "$INPUT_FILE_NAME" ]; then
              CURL_ARGS+=(--form-string "name=${INPUT_FILE_NAME}")
            else
              # Strip extension, replace hyphens/underscores with spaces, title case
              DISPLAY_NAME=$(echo "${FILENAME%.*}" | sed 's/[-_]/ /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2))}1')
              if [ -n "$DISPLAY_NAME" ]; then
                CURL_ARGS+=(--form-string "name=${DISPLAY_NAME}")
              fi
            fi

            RESPONSE=$(curl "${CURL_ARGS[@]}" "${RELAY_URL}/api/v1/files")
            ID=$(echo "$RESPONSE" | jq -e -r '.file.id')
            FILE_IDS+=("$ID")
            echo "  -> file $ID"
          done

          IDS_CSV=$(IFS=,; echo "${FILE_IDS[*]}")
          echo "file_ids=$IDS_CSV" >> "$GITHUB_OUTPUT"
          echo "Uploaded ${#FILE_IDS[@]} file(s): $IDS_CSV"
        env:
          RELAY_URL: ${{ inputs.relay-url }}
          RELAY_API_SECRET: ${{ secrets.RELAY_API_SECRET }}
          INPUT_ARTIFACT_PATH: ${{ inputs.artifact-path }}
          INPUT_ORG: ${{ inputs.org }}
          INPUT_PRODUCT: ${{ inputs.product }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_CHECKSUM: ${{ inputs.checksum-sha256 }}
          INPUT_FILE_NAME: ${{ inputs.file-name }}
