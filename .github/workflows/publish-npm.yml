name: Publish npm

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version"
        type: string
        default: "22"
      pnpm-version:
        description: "pnpm version"
        type: string
        default: "10"
      registry-url:
        description: "npm registry URL"
        type: string
        default: "https://npm.pkg.github.com"
      package-filter:
        description: "pnpm --filter value for monorepo (empty for single package)"
        type: string
        default: ""
      build-script:
        description: "Build command before publish"
        type: string
        default: "pnpm build"
      pre-publish-script:
        description: "Script to run after build, before publish (empty to skip)"
        type: string
        default: ""
      dry-run:
        description: "Run publish in dry-run mode"
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm-version }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
          registry-url: ${{ inputs.registry-url }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        if: inputs.build-script != ''
        run: |
          FILTER="${{ inputs.package-filter }}"
          if [ -n "$FILTER" ]; then
            pnpm --filter "$FILTER" run build
          else
            ${{ inputs.build-script }}
          fi

      - name: Pre-publish
        if: inputs.pre-publish-script != ''
        run: ${{ inputs.pre-publish-script }}

      - name: Publish
        run: |
          FILTER="${{ inputs.package-filter }}"
          DRY_RUN="${{ inputs.dry-run }}"
          FLAGS=""
          if [ "$DRY_RUN" = "true" ]; then
            FLAGS="--dry-run"
          fi

          if [ -n "$FILTER" ]; then
            pnpm --filter "$FILTER" publish --no-git-checks --access restricted $FLAGS
          else
            pnpm publish --no-git-checks --access restricted $FLAGS
          fi
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

      - name: Summary
        run: |
          {
            echo "## Package Published"
            echo ""
            echo "- Registry: ${{ inputs.registry-url }}"
            echo "- Filter: ${{ inputs.package-filter || '(root)' }}"
            echo "- Dry run: ${{ inputs.dry-run }}"
          } >> "$GITHUB_STEP_SUMMARY"
